name: Publish Release (Update Appcast)

# Triggered when a GitHub release is changed from "Draft" to "Published".
# This workflow:
#   1. Downloads the fixed-name VolumeControl.zip from the release assets.
#   2. Updates the Sparkle appcast (VolumeControlCast.xml) pointing to the GitHub Release asset.
#   3. Commits ONLY the updated appcast back to the main branch.
#   4. Future releases are NOT stored in the git repository (Releases/ folder).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to process (e.g. v2.2.0)'
        required: true

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version and build info
        id: info
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          # Get build number from the project file in main
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION' \
            "Volume Control.xcodeproj/project.pbxproj" \
            | sed 's/.*CURRENT_PROJECT_VERSION = \([0-9]*\);.*/\1/')
          ZIP="VolumeControl.zip"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Download Sparkle tools
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the browser_download_url for Sparkle-for-Swift-Package-Manager.zip
          # from the latest Sparkle release
          DOWNLOAD_URL=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/sparkle-project/Sparkle/releases/latest" \
            | python3 bin/get_sparkle_url.py)
          echo "Downloading: $DOWNLOAD_URL"
          curl -fsSL "$DOWNLOAD_URL" -o /tmp/sparkle-spm.zip
          unzip -q /tmp/sparkle-spm.zip -d /tmp/sparkle-spm
          TOOL=$(find /tmp/sparkle-spm -name generate_appcast | head -1)
          if [[ -z "$TOOL" ]]; then
            echo "ERROR: generate_appcast not found in archive"
            find /tmp/sparkle-spm -type f | head -20
            exit 1
          fi
          mkdir -p bin
          cp "$TOOL" bin/generate_appcast
          chmod +x bin/generate_appcast
          echo "Using generate_appcast from: $TOOL"

      - name: Download ZIP from release and place in Releases/
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:      ${{ steps.info.outputs.tag }}
          ZIP:      ${{ steps.info.outputs.zip }}
        run: |
          # Download into Releases/ keeping the original filename (VolumeControl.zip).
          # generate_appcast will use this filename to build the enclosure URL:
          # https://github.com/<repo>/releases/download/<tag>/VolumeControl.zip
          gh release download "$TAG" --pattern "$ZIP" --output "Releases/$ZIP"

      - name: Update Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          REPO:   ${{ github.repository }}
          TAG:    ${{ steps.info.outputs.tag }}
          BUILD:  ${{ steps.info.outputs.build }}
          ZIP:    ${{ steps.info.outputs.zip }}
        run: |
          # Save the original appcast before generate_appcast modifies it
          cp Releases/VolumeControlCast.xml /tmp/original_appcast.xml

          echo "$SPARKLE_ED_PRIVATE_KEY" | base64 --decode | bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix \
              "https://github.com/${REPO}/releases/download/${TAG}/" \
            --maximum-deltas 0 \
            Releases/

          # generate_appcast rewrites ALL entry URLs with the new prefix.
          # Merge only the new <item> into the original appcast so old
          # entries keep their original URLs.
          python3 bin/merge_appcast_item.py \
            Releases/VolumeControlCast.xml \
            /tmp/original_appcast.xml

          # Copy the merged result back as the final appcast
          cp /tmp/original_appcast.xml Releases/VolumeControlCast.xml

          # Remove the ZIP — only the appcast XML is committed to git.
          rm "Releases/$ZIP"

      - name: Inject GitHub release notes into appcast
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:      ${{ steps.info.outputs.tag }}
          BUILD:    ${{ steps.info.outputs.build }}
        run: |
          # Fetch the release description (Markdown) written in the GitHub draft
          gh release view "$TAG" --json body --jq '.body' > /tmp/notes.md

          # Convert Markdown → HTML using the bundled script (no dependencies)
          python3 bin/md_to_html.py /tmp/notes.md /tmp/notes.html

          # Inject the HTML as <description><![CDATA[…]]></description>
          # into the <item> that matches the current build number
          python3 bin/inject_appcast_notes.py 'Releases/VolumeControlCast.xml' /tmp/notes.html

      - name: Commit and push changes to main
        env:
          TAG: ${{ steps.info.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit the appcast update. Existing ZIPs in Releases/ are preserved.
          git add "Releases/VolumeControlCast.xml"
          git commit -m "Release $TAG (automatic appcast update)"
          git push origin main
