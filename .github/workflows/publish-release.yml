name: Publish Release (Update Appcast)

# Triggered when a GitHub release is changed from "Draft" to "Published".
# This workflow:
#   1. Downloads the fixed-name VolumeControl.zip from the release assets.
#   2. Updates the Sparkle appcast (VolumeControlCast.xml) pointing to the GitHub Release asset.
#   3. Commits ONLY the updated appcast back to the main branch.
#   4. Future releases are NOT stored in the git repository (Releases/ folder).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version and build info
        id: info
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Get build number from the project file in main
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION' \
            "Volume Control.xcodeproj/project.pbxproj" \
            | sed 's/.*CURRENT_PROJECT_VERSION = \([0-9]*\);.*/\1/')
          ZIP="VolumeControl.zip"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Download ZIP from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:      ${{ steps.info.outputs.tag }}
          ZIP:      ${{ steps.info.outputs.zip }}
        run: |
          gh release download "$TAG" --pattern "$ZIP" --dir .

      - name: Update Sparkle appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          REPO:        ${{ github.repository }}
          ZIP:         ${{ steps.info.outputs.zip }}
          TAG:         ${{ steps.info.outputs.tag }}
          BUILD:       ${{ steps.info.outputs.build }}
        run: |
          # The appcast generator needs the ZIP locally to calculate its 
          # signature and size. We place it in Releases/ temporarily.
          cp "$ZIP" "Releases/$ZIP"

          # Update the appcast XML in-place.
          # We point the download URL to the GitHub Release asset instead of raw GitHub user content.
          bin/generate_appcast \
            -s "$SPARKLE_KEY" \
            --download-url-prefix \
              "https://github.com/${REPO}/releases/download/${TAG}/" \
            --versions "$BUILD" \
            Releases/
          
          # Clean up the local ZIP so it's not committed to git.
          rm "Releases/$ZIP"

      - name: Inject GitHub release notes into appcast
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:      ${{ steps.info.outputs.tag }}
          BUILD:    ${{ steps.info.outputs.build }}
        run: |
          # Fetch the release description (Markdown) written in the GitHub draft
          gh release view "$TAG" --json body --jq '.body' > /tmp/notes.md

          # Convert Markdown → HTML (pandoc is pre-installed on GitHub macOS runners)
          pandoc -f gfm -t html /tmp/notes.md > /tmp/notes.html

          # Inject the HTML as <description><![CDATA[…]]></description>
          # into the <item> that matches the current build number
          python3 - "$BUILD" 'Releases/VolumeControlCast.xml' /tmp/notes.html << 'PYEOF'
import sys, re

build, appcast_path, notes_path = sys.argv[1], sys.argv[2], sys.argv[3]

with open(notes_path, encoding='utf-8') as f:
    notes_html = f.read().strip()

with open(appcast_path, encoding='utf-8') as f:
    content = f.read()

desc_tag = '<description><![CDATA[\n' + notes_html + '\n            ]]></description>'

item_re = re.compile(
    r'(<item>.*?<sparkle:version>' + re.escape(build) + r'</sparkle:version>.*?)(</item>)',
    re.DOTALL
)

def inject(m):
    inner = m.group(1)
    if '<description>' in inner:
        inner = re.sub(r'<description>.*?</description>', desc_tag, inner, flags=re.DOTALL)
    else:
        inner += '\n            ' + desc_tag + '\n        '
    return inner + m.group(2)

new_content = item_re.sub(inject, content)

if new_content == content:
    print(f'WARNING: no <item> found for build {build}', file=sys.stderr)
    sys.exit(1)

with open(appcast_path, 'w', encoding='utf-8') as f:
    f.write(new_content)

print(f'Release notes injected for build {build}.')
PYEOF

      - name: Commit and push changes to main
        env:
          TAG: ${{ steps.info.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit the appcast update. Existing ZIPs in Releases/ are preserved.
          git add "Releases/VolumeControlCast.xml"
          git commit -m "Release $TAG (automatic appcast update)"
          git push origin main
